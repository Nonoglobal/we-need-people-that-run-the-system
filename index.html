<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>АРХИВ // ГАЛЕРЕЯ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Russo+One&family=Oswald:wght@300;400;600;700&family=Share+Tech+Mono&display=swap');

  :root {
    --black: #0a0a0a;
    --dark: #111111;
    --panel: #161616;
    --border: #2a2a2a;
    --gray: #3a3a3a;
    --mid: #555555;
    --text: #c8c8c8;
    --light: #e8e8e8;
    --accent: #8b8b8b;
    --red: #cc2200;
    --green: #3a6b35;
    --green-bright: #5a9c53;
    --white: #f0f0f0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--black);
    color: var(--text);
    font-family: 'Oswald', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* NOISE TEXTURE */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.4;
  }

  /* SCANLINES */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
    z-index: 9998;
  }

  /* ===== PASSWORD SCREEN ===== */
  #loginScreen {
    position: fixed;
    inset: 0;
    background: var(--black);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    gap: 0;
  }

  .login-emblem {
    width: 90px;
    height: 90px;
    border: 2px solid var(--gray);
    transform: rotate(45deg);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 32px;
    position: relative;
    animation: pulseBox 3s ease-in-out infinite;
  }
  .login-emblem::before {
    content: '☩';
    transform: rotate(-45deg);
    font-size: 32px;
    color: var(--mid);
  }
  .login-emblem::after {
    content: '';
    position: absolute;
    inset: -6px;
    border: 1px solid var(--border);
    transform: none;
  }

  @keyframes pulseBox {
    0%, 100% { border-color: var(--gray); box-shadow: 0 0 0 rgba(255,255,255,0); }
    50% { border-color: var(--mid); box-shadow: 0 0 20px rgba(100,100,100,0.2); }
  }

  .login-title {
    font-family: 'Russo One', sans-serif;
    font-size: 28px;
    letter-spacing: 12px;
    color: var(--white);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .login-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--mid);
    margin-bottom: 48px;
    text-transform: uppercase;
  }

  .login-box {
    border: 1px solid var(--gray);
    padding: 32px 40px;
    width: 340px;
    position: relative;
    background: var(--panel);
  }
  .login-box::before {
    content: '';
    position: absolute;
    top: -1px; left: 20px;
    width: 60px; height: 1px;
    background: var(--black);
  }
  .login-box::after {
    content: '// ДОСТУП ОГРАНИЧЕН';
    position: absolute;
    top: -8px; left: 12px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: var(--mid);
    letter-spacing: 2px;
    background: var(--panel);
    padding: 0 6px;
  }

  .login-label {
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 10px;
    display: block;
  }

  .login-input {
    width: 100%;
    background: var(--dark);
    border: 1px solid var(--gray);
    border-bottom: 2px solid var(--mid);
    color: var(--white);
    font-family: 'Share Tech Mono', monospace;
    font-size: 18px;
    padding: 12px 14px;
    letter-spacing: 8px;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 8px;
  }
  .login-input:focus {
    border-color: var(--white);
  }

  .login-btn {
    width: 100%;
    margin-top: 20px;
    background: var(--gray);
    border: 1px solid var(--mid);
    color: var(--white);
    font-family: 'Russo One', sans-serif;
    font-size: 13px;
    letter-spacing: 5px;
    padding: 14px;
    cursor: pointer;
    text-transform: uppercase;
    transition: background 0.2s, transform 0.1s;
    position: relative;
    overflow: hidden;
  }
  .login-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
    transform: translateX(-100%);
    transition: transform 0.4s;
  }
  .login-btn:hover { background: var(--mid); }
  .login-btn:hover::before { transform: translateX(100%); }
  .login-btn:active { transform: scale(0.98); }

  .login-error {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--red);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 10px;
    opacity: 0;
    transition: opacity 0.3s;
    text-align: center;
  }
  .login-error.show { opacity: 1; }

  /* ===== MAIN APP ===== */
  #app { display: none; min-height: 100vh; }

  /* HEADER */
  header {
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0;
    width: 100%; height: 2px;
    background: linear-gradient(90deg, transparent, var(--gray), transparent);
  }

  .header-logo {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .logo-icon {
    width: 36px; height: 36px;
    border: 1.5px solid var(--mid);
    transform: rotate(45deg);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .logo-icon span {
    transform: rotate(-45deg);
    font-size: 14px;
    color: var(--accent);
  }

  .logo-text {
    font-family: 'Russo One', sans-serif;
    font-size: 18px;
    letter-spacing: 6px;
    color: var(--white);
    text-transform: uppercase;
  }
  .logo-text small {
    display: block;
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--mid);
    margin-top: 2px;
  }

  .header-actions {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .btn-translate {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--accent);
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    padding: 7px 14px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .btn-translate:hover {
    border-color: var(--mid);
    color: var(--white);
    background: var(--border);
  }

  .lang-flag { font-size: 14px; }

  /* STATUS BAR */
  .statusbar {
    background: var(--dark);
    border-bottom: 1px solid var(--border);
    padding: 6px 32px;
    display: flex;
    align-items: center;
    gap: 24px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--mid);
    letter-spacing: 2px;
  }
  .status-dot {
    width: 6px; height: 6px;
    background: var(--green-bright);
    border-radius: 50%;
    display: inline-block;
    animation: blink 2s ease-in-out infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* MAIN CONTENT */
  main {
    max-width: 1300px;
    margin: 0 auto;
    padding: 40px 32px;
  }

  /* UPLOAD ZONE */
  .upload-section {
    margin-bottom: 48px;
  }

  .section-header {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 20px;
  }
  .section-title {
    font-family: 'Russo One', sans-serif;
    font-size: 13px;
    letter-spacing: 5px;
    color: var(--white);
    text-transform: uppercase;
  }
  .section-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--border), transparent);
  }
  .section-count {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--mid);
    letter-spacing: 2px;
  }

  .upload-zone {
    border: 1px dashed var(--gray);
    background: var(--panel);
    padding: 52px 32px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }
  .upload-zone::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.02) 50%, transparent 60%);
    transform: translateX(-100%);
    transition: transform 0.6s;
  }
  .upload-zone:hover { border-color: var(--mid); background: #1a1a1a; }
  .upload-zone:hover::before { transform: translateX(100%); }
  .upload-zone.dragover { border-color: var(--white); background: #1e1e1e; }

  .upload-icon {
    font-size: 42px;
    margin-bottom: 16px;
    opacity: 0.5;
    display: block;
  }
  .upload-main-text {
    font-family: 'Russo One', sans-serif;
    font-size: 14px;
    letter-spacing: 4px;
    color: var(--white);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .upload-sub-text {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--mid);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  #fileInput { display: none; }

  .upload-btn {
    display: inline-block;
    margin-top: 20px;
    background: var(--gray);
    border: 1px solid var(--mid);
    color: var(--white);
    font-family: 'Oswald', sans-serif;
    font-size: 12px;
    letter-spacing: 4px;
    padding: 10px 28px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
  }
  .upload-btn:hover { background: var(--mid); }

  /* GALLERY GRID */
  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 2px;
  }

  .gallery-item {
    position: relative;
    aspect-ratio: 1;
    overflow: hidden;
    background: var(--panel);
    cursor: pointer;
    group: true;
  }

  .gallery-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.4s, filter 0.4s;
    filter: saturate(0.7) contrast(1.1);
  }
  .gallery-item:hover img {
    transform: scale(1.05);
    filter: saturate(1) contrast(1.05);
  }

  .gallery-item-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 50%);
    opacity: 0;
    transition: opacity 0.3s;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    padding: 12px;
  }
  .gallery-item:hover .gallery-item-overlay { opacity: 1; }

  .item-name {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: var(--text);
    letter-spacing: 1px;
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .item-delete {
    background: rgba(180,0,0,0.7);
    border: none;
    color: white;
    width: 24px; height: 24px;
    cursor: pointer;
    font-size: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-left: 8px;
    transition: background 0.2s;
  }
  .item-delete:hover { background: rgba(220,0,0,0.9); }

  .item-index {
    position: absolute;
    top: 8px; left: 8px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: var(--mid);
    letter-spacing: 1px;
    background: rgba(0,0,0,0.6);
    padding: 2px 6px;
  }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 80px 32px;
    border: 1px solid var(--border);
    background: var(--panel);
  }
  .empty-icon { font-size: 48px; opacity: 0.2; margin-bottom: 16px; display: block; }
  .empty-text {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--mid);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  /* LIGHTBOX */
  #lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    z-index: 500;
    align-items: center;
    justify-content: center;
  }
  #lightbox.active { display: flex; }
  #lightbox img {
    max-width: 90vw;
    max-height: 85vh;
    object-fit: contain;
    border: 1px solid var(--border);
  }
  .lightbox-close {
    position: absolute;
    top: 20px; right: 24px;
    background: none;
    border: 1px solid var(--gray);
    color: var(--white);
    font-size: 20px;
    width: 40px; height: 40px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .lightbox-close:hover { background: var(--gray); }

  /* CORNER DECORATIONS */
  .corner-deco {
    position: fixed;
    width: 40px; height: 40px;
    pointer-events: none;
    z-index: 9000;
  }
  .corner-deco.tl { top: 12px; left: 12px; border-top: 1px solid var(--border); border-left: 1px solid var(--border); }
  .corner-deco.tr { top: 12px; right: 12px; border-top: 1px solid var(--border); border-right: 1px solid var(--border); }
  .corner-deco.bl { bottom: 12px; left: 12px; border-bottom: 1px solid var(--border); border-left: 1px solid var(--border); }
  .corner-deco.br { bottom: 12px; right: 12px; border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 32px; right: 32px;
    background: var(--panel);
    border: 1px solid var(--mid);
    border-left: 3px solid var(--green-bright);
    padding: 12px 20px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--white);
    letter-spacing: 2px;
    z-index: 9000;
    transform: translateX(120%);
    transition: transform 0.3s;
  }
  .toast.show { transform: translateX(0); }

  /* PROGRESS BAR */
  .upload-progress {
    height: 2px;
    background: var(--border);
    margin-top: 12px;
    overflow: hidden;
    display: none;
  }
  .upload-progress.active { display: block; }
  .upload-progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--gray), var(--white));
    width: 0%;
    transition: width 0.3s;
  }
</style>
</head>
<body>

<!-- Corner decorations -->
<div class="corner-deco tl"></div>
<div class="corner-deco tr"></div>
<div class="corner-deco bl"></div>
<div class="corner-deco br"></div>

<!-- Toast notification -->
<div class="toast" id="toast"></div>

<!-- PASSWORD SCREEN -->
<div id="loginScreen">
  <div class="login-emblem"></div>
  <div class="login-title" data-ru="АРХИВ" data-de="ARCHIV">АРХИВ</div>
  <div class="login-sub" data-ru="// ЗАЩИЩЁННЫЙ ДОСТУП //" data-de="// GESICHERTER ZUGANG //">// ЗАЩИЩЁННЫЙ ДОСТУП //</div>

  <div class="login-box">
    <label class="login-label" data-ru="КОД ДОСТУПА" data-de="ZUGANGSCODE">КОД ДОСТУПА</label>
    <input type="password" class="login-input" id="pwInput" maxlength="20" placeholder="●●●●●●" autocomplete="off">
    <button class="login-btn" id="loginBtn" data-ru="ВОЙТИ В СИСТЕМУ" data-de="ZUGANG GEWÄHREN">ВОЙТИ В СИСТЕМУ</button>
    <div class="login-error" id="loginError" data-ru="⚠ ДОСТУП ЗАПРЕЩЁН" data-de="⚠ ZUGANG VERWEIGERT">⚠ ДОСТУП ЗАПРЕЩЁН</div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <header>
    <div class="header-logo">
      <div class="logo-icon"><span>◈</span></div>
      <div class="logo-text">
        <span data-ru="АРХИВ" data-de="ARCHIV">АРХИВ</span>
        <small data-ru="// ГАЛЕРЕЯ ИЗОБРАЖЕНИЙ //" data-de="// BILDERGALERIE //">// ГАЛЕРЕЯ ИЗОБРАЖЕНИЙ //</small>
      </div>
    </div>
    <div class="header-actions">
      <button class="btn-translate" id="langToggle">
        <span class="lang-flag" id="langFlag">🇩🇪</span>
        <span id="langLabel">DEUTSCH</span>
      </button>
    </div>
  </header>

  <div class="statusbar">
    <span><span class="status-dot"></span> &nbsp;<span data-ru="СИСТЕМА АКТИВНА" data-de="SYSTEM AKTIV">СИСТЕМА АКТИВНА</span></span>
    <span data-ru="// БЕЗОПАСНОЕ СОЕДИНЕНИЕ" data-de="// SICHERE VERBINDUNG">// БЕЗОПАСНОЕ СОЕДИНЕНИЕ</span>
    <span id="imgCount" data-ru-prefix="ФАЙЛОВ: " data-de-prefix="DATEIEN: ">ФАЙЛОВ: 0</span>
  </div>

  <main>
    <!-- UPLOAD -->
    <div class="upload-section">
      <div class="section-header">
        <span class="section-title" data-ru="ЗАГРУЗКА ФАЙЛОВ" data-de="DATEI-UPLOAD">ЗАГРУЗКА ФАЙЛОВ</span>
        <div class="section-line"></div>
      </div>

      <div class="upload-zone" id="uploadZone">
        <span class="upload-icon">⬡</span>
        <div class="upload-main-text" data-ru="ПЕРЕТАЩИТЕ ИЗОБРАЖЕНИЯ СЮДА" data-de="BILDER HIERHER ZIEHEN">ПЕРЕТАЩИТЕ ИЗОБРАЖЕНИЯ СЮДА</div>
        <div class="upload-sub-text" data-ru="ИЛИ НАЖМИТЕ ДЛЯ ВЫБОРА ФАЙЛОВ" data-de="ODER KLICKEN ZUM AUSWÄHLEN">ИЛИ НАЖМИТЕ ДЛЯ ВЫБОРА ФАЙЛОВ</div>
        <div class="upload-sub-text" style="margin-top:6px; color: var(--gray)">JPG · PNG · GIF · WEBP</div>
        <label class="upload-btn" for="fileInput" data-ru="ВЫБРАТЬ ФАЙЛЫ" data-de="DATEIEN WÄHLEN">ВЫБРАТЬ ФАЙЛЫ</label>
        <input type="file" id="fileInput" accept="image/*" multiple>
        <div class="upload-progress" id="uploadProgress">
          <div class="upload-progress-bar" id="progressBar"></div>
        </div>
      </div>
    </div>

    <!-- GALLERY -->
    <div class="upload-section">
      <div class="section-header">
        <span class="section-title" data-ru="ГАЛЕРЕЯ" data-de="GALERIE">ГАЛЕРЕЯ</span>
        <div class="section-line"></div>
        <span class="section-count" id="galleryCount">0</span>
      </div>

      <div id="galleryGrid" class="gallery-grid"></div>
      <div id="emptyState" class="empty-state">
        <span class="empty-icon">◻</span>
        <div class="empty-text" data-ru="НЕТ ЗАГРУЖЕННЫХ ИЗОБРАЖЕНИЙ" data-de="KEINE BILDER HOCHGELADEN">НЕТ ЗАГРУЖЕННЫХ ИЗОБРАЖЕНИЙ</div>
      </div>
    </div>
  </main>
</div>

<!-- LIGHTBOX -->
<div id="lightbox">
  <button class="lightbox-close" id="lightboxClose">✕</button>
  <img id="lightboxImg" src="" alt="">
</div>

<script>
  // === PASSWORD ===
  const PASSWORD = '010999';
  let currentLang = 'ru';
  let images = JSON.parse(localStorage.getItem('gallery_images') || '[]');

  const loginBtn = document.getElementById('loginBtn');
  const pwInput = document.getElementById('pwInput');
  const loginError = document.getElementById('loginError');
  const loginScreen = document.getElementById('loginScreen');
  const app = document.getElementById('app');

  function tryLogin() {
    if (pwInput.value === PASSWORD) {
      loginScreen.style.opacity = '0';
      loginScreen.style.transition = 'opacity 0.5s';
      setTimeout(() => {
        loginScreen.style.display = 'none';
        app.style.display = 'block';
        renderGallery();
      }, 500);
    } else {
      loginError.classList.add('show');
      pwInput.style.borderColor = 'var(--red)';
      setTimeout(() => {
        loginError.classList.remove('show');
        pwInput.style.borderColor = '';
      }, 2500);
      pwInput.value = '';
    }
  }

  loginBtn.addEventListener('click', tryLogin);
  pwInput.addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });

  // === LANGUAGE TOGGLE ===
  function updateLang() {
    document.querySelectorAll('[data-ru]').forEach(el => {
      if (currentLang === 'ru') {
        el.textContent = el.getAttribute('data-ru');
      } else {
        el.textContent = el.getAttribute('data-de') || el.getAttribute('data-ru');
      }
    });
    // img count
    updateCount();
  }

  document.getElementById('langToggle').addEventListener('click', () => {
    currentLang = currentLang === 'ru' ? 'de' : 'ru';
    document.getElementById('langFlag').textContent = currentLang === 'ru' ? '🇩🇪' : '🇷🇺';
    document.getElementById('langLabel').textContent = currentLang === 'ru' ? 'DEUTSCH' : 'РУССКИЙ';
    updateLang();
  });

  // === UPLOAD ===
  const uploadZone = document.getElementById('uploadZone');
  const fileInput = document.getElementById('fileInput');

  uploadZone.addEventListener('click', e => {
    if (e.target.tagName !== 'LABEL' && e.target.tagName !== 'INPUT') {
      fileInput.click();
    }
  });

  uploadZone.addEventListener('dragover', e => {
    e.preventDefault();
    uploadZone.classList.add('dragover');
  });
  uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
  uploadZone.addEventListener('drop', e => {
    e.preventDefault();
    uploadZone.classList.remove('dragover');
    handleFiles(e.dataTransfer.files);
  });

  fileInput.addEventListener('change', e => handleFiles(e.target.files));

  function handleFiles(files) {
    const progress = document.getElementById('uploadProgress');
    const bar = document.getElementById('progressBar');
    progress.classList.add('active');
    let done = 0;
    const total = files.length;
    if (total === 0) return;

    Array.from(files).forEach(file => {
      if (!file.type.startsWith('image/')) { done++; return; }
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = {
          id: Date.now() + Math.random(),
          name: file.name,
          data: e.target.result,
          date: new Date().toISOString()
        };
        images.push(img);
        done++;
        bar.style.width = (done / total * 100) + '%';
        if (done === total) {
          saveImages();
          renderGallery();
          showToast(currentLang === 'ru' ? `✓ ЗАГРУЖЕНО: ${total}` : `✓ HOCHGELADEN: ${total}`);
          setTimeout(() => {
            progress.classList.remove('active');
            bar.style.width = '0%';
          }, 800);
        }
      };
      reader.readAsDataURL(file);
    });
    fileInput.value = '';
  }

  // === GALLERY ===
  function renderGallery() {
    const grid = document.getElementById('galleryGrid');
    const empty = document.getElementById('emptyState');
    grid.innerHTML = '';

    if (images.length === 0) {
      empty.style.display = 'block';
    } else {
      empty.style.display = 'none';
      images.forEach((img, i) => {
        const item = document.createElement('div');
        item.className = 'gallery-item';
        item.innerHTML = `
          <img src="${img.data}" alt="${img.name}" loading="lazy">
          <div class="gallery-item-overlay">
            <span class="item-name">${img.name}</span>
            <button class="item-delete" data-id="${img.id}" title="Удалить">✕</button>
          </div>
          <div class="item-index">${String(i + 1).padStart(3, '0')}</div>
        `;
        item.querySelector('img').addEventListener('click', () => openLightbox(img.data));
        item.querySelector('.item-delete').addEventListener('click', e => {
          e.stopPropagation();
          deleteImage(img.id);
        });
        grid.appendChild(item);
      });
    }
    updateCount();
  }

  function deleteImage(id) {
    images = images.filter(img => img.id !== id);
    saveImages();
    renderGallery();
    showToast(currentLang === 'ru' ? '✓ УДАЛЕНО' : '✓ GELÖSCHT');
  }

  function saveImages() {
    try {
      localStorage.setItem('gallery_images', JSON.stringify(images));
    } catch(e) {
      // Storage might be full - remove oldest
      if (images.length > 1) {
        images.shift();
        saveImages();
      }
    }
  }

  function updateCount() {
    const prefix = currentLang === 'ru' ? 'ФАЙЛОВ: ' : 'DATEIEN: ';
    document.getElementById('imgCount').textContent = prefix + images.length;
    document.getElementById('galleryCount').textContent = images.length;
  }

  // === LIGHTBOX ===
  function openLightbox(src) {
    document.getElementById('lightboxImg').src = src;
    document.getElementById('lightbox').classList.add('active');
  }
  document.getElementById('lightboxClose').addEventListener('click', () => {
    document.getElementById('lightbox').classList.remove('active');
  });
  document.getElementById('lightbox').addEventListener('click', e => {
    if (e.target === document.getElementById('lightbox')) {
      document.getElementById('lightbox').classList.remove('active');
    }
  });

  // === TOAST ===
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }
</script>
</body>
</html>
